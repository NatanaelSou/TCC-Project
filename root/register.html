<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registrar-se - Serviço de Conteúdo Premium</title>
    <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <svg width="32" height="32" fill="black" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="black"/></svg>
                <span>Serviço de Conteúdo Premium</span>
            </div>
            <h1>Registrar-se</h1>
            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Nome</label>
                    <input type="text" id="name" name="name" required placeholder="Seu nome completo" />
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="seu@email.com" />
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" required placeholder="Crie uma senha" />
                </div>
                <button type="submit" class="btn btn-primary">Registrar</button>
            </form>
            <p class="auth-link">Já tem conta? <a href="login.html">Entrar</a></p>
            <p class="back-link"><a href="landing.html">Voltar ao início</a></p>
        </div>
    </div>
    <script src="scripts/auth.js"></script>
</body>
</html>
